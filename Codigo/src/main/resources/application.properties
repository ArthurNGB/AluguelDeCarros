quarkus.http.port=8080
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.http.test-port=8083
# Upload de imagens dos veiculos
aluguel.upload.veiculos-dir=uploads/veiculos

# O Quarkus tem limite baixo para partes de formulario multipart.
# Sem isso, imagem JPG/PNG pode derrubar/recusar a requisicao antes de chegar no endpoint.
quarkus.http.limits.max-body-size=12M
quarkus.http.limits.max-form-attribute-size=12M
quarkus.http.body.handle-file-uploads=true
quarkus.http.body.uploads-directory=uploads/tmp
quarkus.http.body.delete-uploaded-files-on-end=true
